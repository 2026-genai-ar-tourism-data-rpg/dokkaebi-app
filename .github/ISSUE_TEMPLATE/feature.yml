name: "✨ 작업 (기능/세부)"
description: 내 레포에서 할 작업. 상위 Task(.github 레포 이슈)에 연결합니다.
title: "[작업] "
labels: ["feature"]
body:
  - type: input
    id: parent
    attributes:
      label: 상위 Task
      description: .github 레포의 Task 이슈 URL 또는 번호
      placeholder: 예) 2026-genai-ar-tourism-data-rpg/.github#3
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: 작업 내용
      description: 무엇을 만들/고칠 것인가
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: 완료 조건
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: dropdown
    id: area
    attributes:
      label: 영역
      options:
        - Frontend (App)
        - Backend (Server)
        - AI
        - Infra
        - Data
        - Design
    validations:
      required: true
  - type: input
    id: branch
    attributes:
      label: 브랜치명
      description: "<기능>/<이름>/<버전>"
      placeholder: 예) rag/junhyung/v1
